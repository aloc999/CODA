# CODA Configuration
# Copy this to your project and modify as needed

# Core settings
CODA_TARGET="./"
CODA_SOLC_VERSION="0.8.34"

# Solc binary path
CODA_SOLC_BIN=""

# Tool-specific settings
SLITHER_FILTER="test|node_modules|lib|script"
SLITHER_EXCLUDE="naming-convention,solc-version"

MYTHRIL_TIMEOUT="90"

ECHIDNA_TEST_LIMIT="50000"
ECHIDNA_SEQ_LEN="100"

MEDUSA_TEST_LIMIT="100000"
MEDUSA_WORKERS="4"

HALMOS_TIMEOUT="120"
HALMOS_SOLVER_TIMEOUT="10000"

GAMBIT_NUM_MUTANTS="20"
GAMBIT_SEED="42"

# Certora (set env var CERTORA_KEY separately)
# CERTORA_KEY=

# Skip specific tools (comma-separated: slither,mythril,echidna,medusa,halmos,certora,gambit)
# CODA_SKIP=

# RPC URL for fork testing
# RPC_URL=

# Output directory
# CODA_OUTPUT="./coda-report"
